# Build Docker image with CI/CD and push to the GitLab registry.

variables:
  CI_REGISTRY: "eoelab.org:1032/build-image-stacks/gameserver-image-stacks"
before_script:
  - docker login -u $CI_USER -p $CI_PASSWORD $LOCAL_REGISTRY
base-build:
  tags: [build]
  stage: build
  needs: []
  script:
    - cd base
    - docker build -t $CI_REGISTRY/gameserver:base . --network=host
steam-build:
  tags: [build]
  stage: build
  needs: [base-build]
  script:
    - cd steam
    - docker build -t  $CI_REGISTRY/gameserver:steam . --network=host 
    - docker push $CI_REGISTRY/gameserver:steam
7dtd-build:
  tags: [build]
  stage: build
  needs: [steam-build]
  script:
    - cd 7dtd
    - docker build -t  $CI_REGISTRY/gameserver:7dtd . --network=host 
    - docker push $CI_REGISTRY/gameserver:7dtd
java-8-build:
  tags: [build]
  stage: build
  needs: [base-build]
  script:
    - cd Minecraft/java-8
    - docker build -t $CI_REGISTRY/gameserver:java-8 . --network=host
    - docker push $CI_REGISTRY/gameserver:java-8
java-11-build:
  tags: [build]
  stage: build
  needs: [base-build]
  script:
    - cd Minecraft/java-11
    - docker build -t $CI_REGISTRY/gameserver:java-11 . --network=host
    - docker push $CI_REGISTRY/gameserver:java-11
java-17-build:
  tags: [build]
  stage: build
  needs: [base-build]
  script:
    - cd Minecraft/java-17
    - docker build -t $CI_REGISTRY/gameserver:java-17 . --network=host
    - docker push $CI_REGISTRY/gameserver:java-17
